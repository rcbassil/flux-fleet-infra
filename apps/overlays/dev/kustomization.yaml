apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base
namePrefix: dev-
commonLabels:
  env: development

# FIX: Prevent Kustomize from prefixing the HelmRepository name
# so the HelmRelease sourceRef can still find it.
transformers:
  - |-
    apiVersion: builtin
    kind: PrefixSuffixTransformer
    metadata:
      name: custom-prefixer
    prefix: dev-
    skipTemplates:
      - kind: HelmRepository
        name: bitnami-repo

patches:
  - target:
      kind: HelmRelease
      name: my-nginx # Kustomize is smart enough to find the prefixed version here
    patch: |
      - op: replace
        path: /spec/values/replicaCount
        value: 1
