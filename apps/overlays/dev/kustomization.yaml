apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base/nginx
  - ../../base/vault           # New
  - ../../base/vault-operator  # New
namePrefix: dev-
commonLabels:
  env: development
# Generate a new version of the ConfigMap for Dev
configMapGenerator:
  - name: nginx-values
    namespace: flux-system
    behavior: replace # <--- This replaces the base ConfigMap
    files:
      - nginx-values.yaml   # Points to the file we just created above
    options:
      disableNameSuffixHash: true
  - name: vault-values
    namespace: flux-system
    #behavior: replace
    files:
      - vault-values.yaml
    options:
      disableNameSuffixHash: true
  - name: vault-operator-values
    namespace: flux-system
    #behavior: replace
    files:
      - vault-operator-values.yaml
    options:
      disableNameSuffixHash: true
# Manually tell the HelmRelease to look for the prefixed ConfigMap
patches:
  - target:
      kind: HelmRelease
      name: my-nginx
    patch: |
      - op: replace
        path: /spec/valuesFrom/0/name
        value: dev-nginx-values
  - target:
      kind: HelmRelease
      name: vault
    patch: |
      - op: replace
        path: /spec/valuesFrom/0/name
        value: dev-vault-values
  - target:
      kind: HelmRelease
      name: vault-secrets-operator
    patch: |
      - op: replace
        path: /spec/valuesFrom/0/name
        value: dev-vault-operator-values
      - op: replace
        path: /spec/dependsOn/0/name
        value: dev-vault
  - target:
      kind: VaultStaticSecret
      name: nginx-db-secret
    patch: |
      - op: replace
        path: /spec/vaultAuthRef # Point to the Auth object instead
        value: dev-vault-auth
  - target:
      kind: VaultAuth
      name: vault-auth
    patch: |
      - op: replace
        path: /spec/vaultConnectionRef
        value: dev-vault-connection

