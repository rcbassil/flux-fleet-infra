apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base
namePrefix: dev-
commonLabels:
  env: development
patches:
  - target:
      kind: HelmRelease
      name: my-app
    patch: |
      - op: replace
        path: /spec/values/ui/color
        value: "#dev-blue"
      - op: add
        path: /spec/values/replicaCount
        value: 1
