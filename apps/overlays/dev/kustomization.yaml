apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base/nginx
namePrefix: dev-
commonLabels:
  env: development
configMapGenerator:
  - name: nginx-values
    namespace: flux-system
    behavior: merge
    files:
      - overrides.yaml=nginx-values.yaml
    options:
      disableNameSuffixHash: true
patches:
  - target:
      kind: HelmRelease
      name: nginx-server
    patch: |
      - op: replace
        path: /spec/valuesFrom/0/name
        value: dev-nginx-values
      - op: replace
        path: /spec/valuesFrom/1/name
        value: dev-nginx-values
  - target:
      kind: VaultStaticSecret
      name: nginx-db-secret
    patch: |
      - op: replace
        path: /spec/vaultAuthRef
        value: dev-static-auth
  - target:
      kind: VaultAuth
      name: static-auth
    patch: |
      - op: replace
        path: /spec/vaultConnectionRef
        value: vault-system/vault-connection
