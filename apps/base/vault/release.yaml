apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vault
  namespace: flux-system
spec:
  releaseName: vault
  targetNamespace: vault-system # It's cleaner to isolate Vault
  interval: 15m
  chart:
    spec:
      chart: vault
      version: "0.28.x" # 2026 Stable version
      sourceRef:
        kind: HelmRepository
        name: hashicorp-repo
        namespace: flux-system
  valuesFrom:
    - kind: ConfigMap
      name: vault-values
      valuesKey: vault-values.yaml