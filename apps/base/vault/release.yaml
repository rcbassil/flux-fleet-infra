apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vault
  namespace: flux-system
spec:
  releaseName: vault
  targetNamespace: vault-system # It's cleaner to isolate Vault
  interval: 15m
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  chart:
    spec:
      chart: vault
      version: "0.29.x"
      sourceRef:
        kind: HelmRepository
        name: hashicorp-repo
        namespace: flux-system
  valuesFrom:
    - kind: ConfigMap
      name: vault-values
      valuesKey: defaults.yaml
    - kind: ConfigMap
      name: vault-values
      valuesKey: overrides.yaml
      optional: true
