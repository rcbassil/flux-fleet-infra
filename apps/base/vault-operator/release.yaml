apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vault-secrets-operator
  namespace: flux-system
spec:
  releaseName: vault-secrets-operator
  targetNamespace: vault-system
  interval: 1h
  dependsOn:
    - name: vault # Ensures Vault is up before the operator tries to connect
  chart:
    spec:
      chart: vault-secrets-operator
      version: "0.9.x"
      sourceRef:
        kind: HelmRepository
        name: hashicorp-repo
        namespace: flux-system
    # This replaces the "values:" block
  valuesFrom:
    - kind: ConfigMap
      name: vault-operator-values
      valuesKey: vault-operator-values.yaml