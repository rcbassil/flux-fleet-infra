apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: my-nginx
  namespace: flux-system # The controller lives here
spec:
  releaseName: nginx-server
  targetNamespace: web-apps # The app will be installed here
  interval: 15m
  chart:
    spec:
      chart: nginx
      version: "22.x.x" # Uses semver to stay on version 18
      sourceRef:
        kind: HelmRepository
        name: bitnami-repo
        namespace: flux-system
      install:
        remediation:
          retries: 3
      upgrade:
        remediation:
          retries: 3
      # This force-triggers a rollout if the values change
      force: true  
  # This replaces the "values:" block
  valuesFrom:
    - kind: ConfigMap
      name: nginx-values
      valuesKey: nginx-values.yaml
