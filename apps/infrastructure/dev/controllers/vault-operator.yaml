apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vault-secrets-operator
  namespace: flux-system
spec:
  releaseName: vault-secrets-operator
  targetNamespace: vault-system
  interval: 30m
  dependsOn:
    - name: vault
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  chart:
    spec:
      chart: vault-secrets-operator
      version: "0.9.x"
      sourceRef:
        kind: HelmRepository
        name: hashicorp-repo
        namespace: flux-system
  values:
    defaultVaultConnection:
      enabled: true
      address: "http://vault.vault-system.svc.cluster.local:8200"
