apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kuma
  namespace: flux-system
spec:
  releaseName: kuma
  targetNamespace: kuma-system
  interval: 15m
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  chart:
    spec:
      chart: kuma
      version: "2.x.x"
      sourceRef:
        kind: HelmRepository
        name: kuma-repo
        namespace: flux-system
  values:
    controlPlane:
      replicas: 1
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          memory: 512Mi
