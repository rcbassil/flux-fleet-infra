apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vault
  namespace: flux-system
spec:
  releaseName: vault
  targetNamespace: vault-system
  interval: 15m
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  chart:
    spec:
      chart: vault
      version: "0.29.x"
      sourceRef:
        kind: HelmRepository
        name: hashicorp-repo
        namespace: flux-system
  values:
    server:
      dev:
        enabled: false
      affinity: ""
      dataStorage:
        enabled: true
        size: "10Gi"
        mountPath: "/vault/data"
        storageClass: "standard"
        accessMode: ReadWriteOnce
    injector:
      affinity: ""
