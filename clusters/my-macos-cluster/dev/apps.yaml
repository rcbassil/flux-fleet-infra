# clusters/dev/apps.yaml
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: dev-apps-sync
  namespace: flux-system
spec:
  interval: 10m
  path: ./apps/overlays/dev # <--- Points to the Dev Overlay
  prune: true
  wait: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: dev-infra-sync
